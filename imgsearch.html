<!doctype html>
<html lang="en">

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>search</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
			integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
		<link href="styles.css" rel="stylesheet">
	</head>

	<body>
		<div class="d-flex basic-spacing justify-content-end upperbar">
			<a href="index.html" class="basic-spacing">Google Search</a>
		</div>
		<div class="content">
			<form action="https://google.com/search">
				<div class="d-flex justify-content-center">
					<input class="d-flex" type="text" id="searchbox" name="q">
					<input type="hidden" name="tbm" value="isch"> <!--redirects to image search-->
				</div>
				<div class="search">
					<input type="submit" value="Image Search">
				</div>

			</form>
		</div>
	</body>

</html>
